 <!DOCTYPE html>
<html lang="en">
<head>
 <meta name="description" content="Convert text to voice online for free. Use our AI text to speech tool with multiple voices and download audio instantly.">
<meta name="google-site-verification" content="wiZuZDvOPOqIncDLRmvZu2JEa6uuSHDQDIFFPdq2vgU" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Text to Speech Generator Online | Convert Text to Voice</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* 🔥 Animated Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#000,#111,#1a1a1a,#000);
    background-size:400% 400%;
    animation:bg 8s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ✨ Particles */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity:0.2;
    animation:move 60s linear infinite;
}

@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-50%, -50%);}
}

/* 💎 Glass Container */
.container{
    width:90%;
    max-width:420px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    text-align:center;
    z-index:2;
}

/* ⌨️ Typing Effect */
h2{
    color:#00e5ff;
    margin-bottom:15px;
    border-right:2px solid #00e5ff;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation:typing 3s steps(20,end) forwards, blink 0.7s infinite;
}

@keyframes typing{
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* Inputs */
textarea, select, input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

/* 🎵 Wave */
.wave{
    display:flex;
    justify-content:center;
    gap:3px;
    margin-top:10px;
}

.wave span{
    width:4px;
    height:10px;
    background:#00e5ff;
    animation:wave 1s infinite;
}

.wave span:nth-child(2){animation-delay:0.1s;}
.wave span:nth-child(3){animation-delay:0.2s;}
.wave span:nth-child(4){animation-delay:0.3s;}
.wave span:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
    0%,100%{height:10px;}
    50%{height:25px;}
}

/* Buttons */
.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.convert{
    background:#00c853;
    box-shadow:0 0 10px #00c853;
}

.download{
    background:#2962ff;
    box-shadow:0 0 10px #2962ff;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px cyan;
}

/* Responsive */
@media(max-width:500px){
    .button-group{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">
   <h1>Free Text to Speech Generator</h1>

    <textarea id="text" placeholder="Enter text"></textarea>

    <select id="voices"></select>

    <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
    <label style="color:white;">Speed</label>

    <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
    <label style="color:white;">Pitch</label>

    <!-- 🎵 Wave Animation -->
    <div class="wave" id="wave">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="button-group">
        <button class="convert" onclick="speakText()">Convert</button>
        <button class="download" onclick="downloadAudio()">Download</button>
    </div>
</div>

<script>
let voices = [];

function loadVoices() {
    voices = speechSynthesis.getVoices();
    let select = document.getElementById("voices");
    select.innerHTML = "";

    voices.forEach((voice, i) => {
        let option = document.createElement("option");
        option.value = i;
        option.textContent = voice.name + " (" + voice.lang + ")";
        select.appendChild(option);
    });
}

function speakText() {
    let text = document.getElementById("text").value;
    let voiceIndex = document.getElementById("voices").value;
    let wave = document.getElementById("wave");

    speechSynthesis.cancel();

    let utterance = new SpeechSynthesisUtterance(text);

    wave.style.display = "flex";

    setTimeout(() => {
        if (voices[voiceIndex]) {
            utterance.voice = voices[voiceIndex];
        }

        utterance.rate = document.getElementById("rate").value;
        utterance.pitch = document.getElementById("pitch").value;

        speechSynthesis.speak(utterance);
    }, 200);

    utterance.onend = () => {
        wave.style.display = "none";
    };
}

function downloadAudio() {
    alert("Download feature backend/API se possible hai.");
}

speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 500);
</script>

</body>
</html>
